# TIES Merge Config — GnLOLot + Luminia
# Run: mergekit-yaml merge.yaml /workspace/models/merged --cuda

models:
  - model: /workspace/models/GnLOLot
    parameters:
      weight: 0.55
  - model: /workspace/models/Luminia
    parameters:
      weight: 0.45

merge_method: ties
base_model: /workspace/models/Luminia
parameters:
  density: 0.6
  normalize: true
  weight: 1.0
dtype: bfloat16
